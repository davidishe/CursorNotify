#
# Wire "needs: [deploy]" and deploy_result to match YOUR deploy job id.
name: Deploy and notify (Telegram, local reusable)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Replace with your deploy steps."

  notify:
    needs: [deploy]
    if: always()
    uses: ./.github/workflows/reusable-telegram-deploy-notify.yml
    with:
      deploy_result: ${{ needs.deploy.result }}
    secrets: inherit
